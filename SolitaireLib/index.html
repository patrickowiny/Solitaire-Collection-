<html>

<head>
  <title>Solitaire</title>
  <link href="./index.scss" rel="stylesheet">
  <link rel="shortcut icon" href="./Images/Icon.png">
  <link rel="apple-touch-icon" href="./Images/Icon-Solid.png">
  <script type="module" src="./index.ts"></script>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
  <header id="siteHeader">
    <div style="display: flex; align-items: center;">
      <div class="siteLogo">SolitaireLib</div>
      <span id="activeGameTitle" style="margin-left: 20px; font-weight: bold; font-size: 2.2vh; color: #ffcc00; display: none;"></span>
    </div>
    <div class="navLinks">
      <a href="#" id="homeLink">Home</a>
      <a href="#" id="backToGamesLink" style="display: none;">&larr; Back to all games</a>
    </div>
  </header>

  <div id="homePage" style="display: none;">
    <h1>Welcome to SolitaireLib</h1>
    <p>Choose a game to play.</p>
    <div id="gameGrid"></div>
  </div>

  <div id="gamePage" style="display: none; overflow-y: auto; height: 100%;">
    <div id="gameArea" style="position: relative; height: 90vh;">
      <div id="tableHolder" style="position: absolute; left: 0; right: 0; top: 0; bottom: 5vh;"></div>
      <div id="buttons" style="position: absolute; left: 0; right: 0; bottom: 0; height: 5vh;">
        <button id="newGameButton">New Game</button>
        <button id="undoButton">Undo</button>
        <button id="redoButton">Redo</button>
      </div>
    </div>
    <div id="howToPlaySection" style="padding: 30px; color: white; background-color: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.2);">
      <h2 id="howToPlayTitle" style="color: #ffcc00; margin-top: 0; font-size: 2.5vh;">How to Play</h2>
      <div id="howToPlayContent" style="font-size: 1.8vh; line-height: 1.6; max-width: 800px; margin: 0 auto; text-align: left;"></div>
    </div>
  </div>

  <footer id="siteFooter">
    Powered by <a href="https://github.com/zzymyn/SolitaireLib" target="_blank" rel="noopener">SolitaireLib</a>.
  </footer>

<template id="rootViewTemplate">
  <div class="cardTable">
    <span class="gameScore">12 / 100</span>
  </div>
</template>

<template id="cardViewTemplate">
  <div class="card">
    <div class="cardRotation">
      <div class="cardFront"></div>
      <div class="cardBack"></div>
    </div>
  </div>
</template>

<template id="pileViewTemplate">
  <div class="pile">
  </div>
</template>

</html>
